{{define "title"}}Shows{{end}}
{{define "content"}}
<section>
  <h2 class="section-title">Shows</h2>
  <div class="section-sub">Tour Calendar · Front Range</div>
  <div class="cal-wrap">
    <div class="cal" id="calendar">
      <div class="cal-head">
        <div class="month">
          <span id="cal-month-name">—</span><span class="yr" id="cal-year">—</span>
        </div>
        <div class="cal-nav">
          <button type="button" id="cal-prev" aria-label="Previous month">‹</button>
          <button type="button" id="cal-today" aria-label="Today" title="Today">●</button>
          <button type="button" id="cal-next" aria-label="Next month">›</button>
        </div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div class="show-list" id="show-list"></div>
  </div>
</section>
{{end}}
