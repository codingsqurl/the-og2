services:
  api:
    build: .
    container_name: og2-api
    ports:
      - "8090:8080"
    environment:
      - PORT=8080
      - DB_PATH=/data/portfolio.db
    volumes:
      - sqlite-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  sqlite-data:
